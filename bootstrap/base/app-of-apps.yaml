apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-of-apps
  namespace: argocd-base            # wird per Overlay gesetzt
spec:
  project: default
  source:
    repoURL: https://github.com/adilosch/user-resources-pipeline.git
    targetRevision: main
    path: argocd/apps               # URP Apps liegen hier
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd-base
  syncPolicy:
    automated:
      prune: true
      selfHeal: true