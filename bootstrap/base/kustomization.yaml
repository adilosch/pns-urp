# bootstrap/base/kustomization.yaml
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - app-of-apps.yaml

helmCharts:
  - name: argo-cd
    repo: https://argoproj.github.io/argo-helm
    version: "7.3.4"
    releaseName: argocd
    namespace: argocd-base          # wird per Overlay überschrieben
    valuesInline:
      global:
        domain: argocd.example.com
      server:
        service:
          type: ClusterIP
      configs:
        params:
          server.insecure: true     # für Simulation ohne TLS