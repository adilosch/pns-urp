apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: urp-root-onprem
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/adilosch/pns-urp.git
    targetRevision: main
    path: clusters/onprem
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
