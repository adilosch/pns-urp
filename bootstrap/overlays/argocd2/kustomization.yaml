apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: argocd2                  # ← das ist der einzige Unterschied pro Overlay
resources:
  - ../../base
patches:
  - target:
      kind: Namespace
      name: argocd-base
    patch: |-
      - op: replace
        path: /metadata/name
        value: argocd2
  - target:
      group: argoproj.io
      version: v1alpha1
      kind: Application
      name: app-of-apps
    patch: |-
      - op: replace
        path: /spec/destination/namespace
        value: argocd2
