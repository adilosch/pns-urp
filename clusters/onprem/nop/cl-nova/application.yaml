apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: urp-onprem-cl-nova-nop
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://git.example.com/platform/user-resources-pipeline.git
    targetRevision: v1.2.3
    path: overlays/onprem/nop/cl-nova
  destination:
    name: onprem-cl-nova
    namespace: urp-nop
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
